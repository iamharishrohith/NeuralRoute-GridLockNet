<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="2; url=https://iamharishrohith.github.io/NeuralRoute-GridLockNet/">
    <title>Redirecting to Live Master Dashboard...</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #F8FAFC;
            color: #0F172A;
            font-family: 'Outfit', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-image: radial-gradient(circle at 50% 50%, rgba(26, 86, 219, 0.05) 0%, transparent 60%);
        }
        .redirect-card {
            background: rgba(255, 255, 255, 0.85);
            border: 1px solid rgba(26, 86, 219, 0.1);
            border-radius: 16px;
            padding: 40px;
            max-width: 480px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(15, 23, 42, 0.06);
            backdrop-filter: blur(12px);
        }
        h1 {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #0F172A 0%, #1A56DB 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            color: #475569;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 24px;
        }
        .btn-link {
            display: inline-block;
            background: linear-gradient(135deg, #1A56DB 0%, #2563EB 100%);
            color: white;
            text-decoration: none;
            padding: 12px 28px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 14px;
            box-shadow: 0 4px 15px rgba(26, 86, 219, 0.2);
            transition: all 0.3s ease;
        }
        .btn-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(26, 86, 219, 0.3);
        }
        .loader {
            width: 24px;
            height: 24px;
            border: 3px solid rgba(26, 86, 219, 0.1);
            border-top: 3px solid #1A56DB;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="redirect-card">
        <h1>NeuralRoute GridLockNet™</h1>
        <p>Connecting you to the live interactive Master Command Console hosted on GitHub Pages.</p>
        <a class="btn-link" href="https://iamharishrohith.github.io/NeuralRoute-GridLockNet/">Launch Live Dashboard</a>
        <div class="loader"></div>
    </div>
</body>
</html>
